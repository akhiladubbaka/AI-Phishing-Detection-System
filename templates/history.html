<!DOCTYPE html>
<html>
  <head>
    <title>Prediction History</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>

  <body>
    <div class="container">
      <h1>Prediction History</h1>

      <table border="1" cellpadding="10">
        <tr>
          <th>URL</th>

          <th>Prediction</th>

          <th>Confidence</th>

          <th>Risk</th>

          <th>Date</th>
        </tr>

        {% for row in history %}

        <tr>
          <td>{{ row[0] }}</td>

          <td>{{ row[1] }}</td>

          <td>{{ row[2] }}%</td>

          <td>{{ row[3] }}</td>

          <td>{{ row[4] }}</td>
        </tr>

        {% endfor %}
      </table>

      <br />

      <a href="/">
        <button>⬅ Back</button>
      </a>
    </div>
  </body>
</html>
